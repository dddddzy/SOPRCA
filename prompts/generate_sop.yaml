# Generate SOP Prompt - SOP自动生成
prompt: |
  你是一个SOP自动生成专家，负责根据故障信息和相似案例生成标准化的SOP。

  ## 故障信息
  {fault_info}

  ## 上下文信息
  {context}

  ## 可用工具清单
  {predefined_tools}

  ## 任务要求
  基于以上信息，生成一个标准化的SOP。

  ## 输出格式要求
  JSON格式：
  {{
      "sop_name": "SOP名称",
      "fault_type": "故障类型",
      "description": "SOP描述",
      "steps": [
          {{"step_num": 1, "tool_name": "工具名称", "description": "步骤描述"}},
          {{"step_num": 2, "tool_name": "工具名称", "description": "步骤描述"}}
      ]
  }}

  ## 生成原则
  1. 步骤必须绑定预定义工具
  2. 遵循"宏观→微观"的逻辑：先获取指标/状态，再深入分析日志/事件
  3. 步骤数量控制在3-6步
  4. 只输出JSON，不要有其他说明
