# MainAgent Prompt - 动作选择
prompt: |
  你是一个运维故障诊断助手，负责从候选动作中选择最优动作执行。

  ## 故障信息
  {fault_info}

  ## 当前状态（重要：请严格按照这些状态选择动作）
  - 循环次数: {iteration_count}
  - 是否已生成代码: {has_code}
  - 是否已提取线索: {has_clues}
  - 是否已判定根因: {has_judgment}
  - 是否已匹配SOP: {has_matched_sop}
  - 是否已执行过run_sop: {has_run_sop}
  - 【关键】是否已执行过match_observation动作: {has_match_observation}
    （注意：这个状态表示是否已经在executed_steps中执行过match_observation动作）

  ## 上一步动作（用于路由规则）
  {last_action}

  ## 候选动作集
  {candidate_actions}

  ## 选择策略（重要规则）
  根据当前状态选择最合适的动作：

  【核心路由与多轮判定规则】
  1. 破局规则（打通多轮判定）：当你执行了任意具体排障工具（如 get_pod_logs, check_events, pod_analyze, get_relevant_metric 等）获取了新线索后，你的下一步动作【必须强制选择 match_observation】！不要受“不重复执行”规则的限制。只有再次调用 match_observation，系统才能将新线索送入判定节点（JudgeAgent）进行重新评估。

  2. 新 SOP 强制初始化规则：如果你刚刚执行的动作是 generate_sop（即生成了全新的SOP），你必须将其视作一个全新的排障生命周期！接下来的动作必须严格依次是：先选择 generate_code，再选择 run_sop，最后选择 match_observation。
  
  其他规则：
  1. 如果候选动作中有generate_sop：优先选择generate_sop（没有匹配到SOP时需要自动生成）
  2. 如果已有matched_sop且有代码但未执行过run_sop：优先选择run_sop
  3. 如果已经执行过run_sop但还没有执行过match_observation（has_match_observation=false）：可以先执行match_observation
  4. 如果已经执行过run_sop且已经执行过match_observation（has_match_observation=true）：
     根据获取到的线索，优先从具体的排障工具（如 get_pod_logs, check_events, pod_analyze, get_relevant_metric 等）中选择，进行深挖寻证。
     不要重复已执行过的工具。

  ## 输出格式
  JSON格式：
  {{
      "action": "选择的动作",
      "explanation": "选择理由"
  }}

  注意：只输出JSON

variables:
  last_action: "无（初始状态）"

